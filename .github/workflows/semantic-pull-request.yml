name: "Semantic Pull Request"

on: # yamllint disable-line rule:truthy
    pull_request_target:
        types:
            - "opened"
            - "reopened"
            - "edited"
            - "synchronize"
    merge_group: # yamllint disable-line rule:empty-values

jobs:
    stale-issues:
        uses: "anolilab/workflows/.github/workflows/semantic-pull-request.yml@5b10e6a2e712406be0b8317df4d437c69b1221ad" # main
        with:
            target-repo: "anolilab/ai-models"
