name: "Lint"
on:
    pull_request:
        branches: ["main"]
permissions: {}
jobs:
    lint:
        permissions:
            contents: "read"
            pull-requests: "read"
        uses: "anolilab/workflows/.github/workflows/lint.yml@5b340a228896b01f6d2b6f3bf3b574caed9ee89b" # v15.3.1+
        with:
            lint_eslint: true
            lint_types: true
            lint_attw: true
            lint_package_json: true
            lint_markdown: false
            lint_yaml: true
            lint_actionlint: true
            lint_rust: false
            node_version: "22"
