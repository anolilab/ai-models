packages:
  - web
  - packages/*

minimumReleaseAge: 1440
trustPolicy: no-downgrade
# These pre-existing transitive versions lost provenance attestation upstream and
# trip trustPolicy: no-downgrade under pnpm 11 (enforced at install, not just dedupe).
# Allow-listed by exact version after review; revisit when provenance-attested releases land.
trustPolicyExclude:
  - semver@6.3.1
  - chokidar@4.0.3
  - "@netlify/edge-bundler@14.10.3"
  - "@netlify/serverless-functions-api@2.16.0"
  - "@netlify/zip-it-and-ship-it@14.7.0"
blockExoticSubdeps: true

onlyBuiltDependencies:
  - "@parcel/watcher"
  - "@tailwindcss/oxide"
  - core-js
  - esbuild
  - nx
  - oxc-resolver
  - protobufjs
  - puppeteer
  - rs-module-lexer
  - sharp
  - unrs-resolver

overrides:
  "@opentelemetry/exporter-prometheus@<0.217.0": ">=0.217.0"
  "@opentelemetry/sdk-node@<0.217.0": ">=0.217.0"
